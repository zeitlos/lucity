{{- range $name, $svc := .Values.services }}
{{- if $svc.domains }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lucity-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "lucity-app.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name | default "lucity-gateway" }}
      {{- if $.Values.gateway.namespace }}
      namespace: {{ $.Values.gateway.namespace }}
      {{- end }}
  hostnames:
    {{- range $svc.domains }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "lucity-app.fullname" $ }}-{{ $name }}
          port: {{ $svc.port }}
{{- end }}
{{- end }}
