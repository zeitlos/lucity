{{- range $name, $data := .Values.config }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lucity-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "lucity-app.labels" $ | nindent 4 }}
data:
  {{- range $key, $val := $data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
