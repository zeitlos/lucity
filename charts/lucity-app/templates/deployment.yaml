{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lucity-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "lucity-app.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
    {{- if $svc.githubInstallationId }}
    lucity.dev/github-installation: {{ printf "%.0f" $svc.githubInstallationId | quote }}
    {{- end }}
  {{- if $svc.sourceUrl }}
  annotations:
    lucity.dev/source-repo: {{ $svc.sourceUrl | quote }}
  {{- end }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "lucity-app.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lucity-app.labels" $ | nindent 8 }}
        {{- include "lucity-app.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag | default "latest" }}"
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $key, $ref := $svc.databaseRefs }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "lucity-app.fullname" $ }}-pg-{{ $ref.database }}-app
                  key: {{ $ref.key }}
            {{- end }}
            {{- range $key, $ref := $svc.serviceRefs }}
            {{- $target := index $.Values.services $ref.service }}
            - name: {{ $key }}
              value: {{ printf "http://%s-%s:%d" (include "lucity-app.fullname" $) $ref.service ($target.port | int) | quote }}
            {{- end }}
          resources:
          {{- if $svc.resources }}
            {{- toYaml $svc.resources | nindent 12 }}
          {{- else }}
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          {{- end }}
{{- end }}
