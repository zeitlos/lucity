{{- range $name, $svc := .Values.services }}
{{- if and $svc.image $svc.image.tag }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lucity-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "lucity-app.labels" $ | nindent 4 }}
    {{- include "lucity-app.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
    {{- if $svc.githubInstallationId }}
    lucity.dev/github-installation: {{ $svc.githubInstallationId | quote }}
    {{- end }}
  {{- if $svc.sourceUrl }}
  annotations:
    lucity.dev/source-repo: {{ $svc.sourceUrl | quote }}
  {{- end }}
spec:
  {{- if $.Values.suspended }}
  replicas: 0
  {{- else if not (and $svc.autoscaling $svc.autoscaling.enabled) }}
  replicas: {{ $svc.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lucity-app.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lucity-app.labels" $ | nindent 8 }}
        {{- include "lucity-app.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: lucity-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          {{- if $svc.customStartCommand }}
          command: ["sh", "-c", {{ $svc.customStartCommand | quote }}]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $key, $ref := $svc.databaseRefs }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "lucity-app.fullname" $ }}-pg-{{ $ref.database }}-app
                  key: {{ $ref.key }}
            {{- end }}
            {{- range $key, $ref := $svc.serviceRefs }}
            {{- $target := index $.Values.services $ref.service }}
            - name: {{ $key }}
              value: {{ printf "http://%s-%s:%d" (include "lucity-app.fullname" $) $ref.service ($target.port | int) | quote }}
            {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
{{- end }}
