apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "lucity-app.fullname" . }}-defaults
  labels:
    {{- include "lucity-app.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
