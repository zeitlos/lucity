# Lucity application chart — values generated by the packager service.
#
# services:
#   api:
#     image:
#       repository: registry.example.com/myapp/api
#       tag: latest
#     port: 3000
#     replicas: 1
#     domains:
#       - api-production.lucity.app
#       - api.example.com
#     resources:                        # optional — overrides LimitRange defaults
#       requests:
#         cpu: 100m
#         memory: 128Mi
#       limits:
#         cpu: 500m
#         memory: 256Mi
#     # When omitted, the namespace LimitRange applies:
#     #   defaultRequest: cpu=100m, memory=256Mi
#     #   default:        cpu=500m, memory=512Mi
#     autoscaling:                      # optional — HPA configuration
#       enabled: true
#       minReplicas: 1
#       maxReplicas: 10
#       targetCPU: 70                   # target CPU utilization %
#
# cronJobs:
#   cleanup:
#     schedule: "0 3 * * *"
#     image:
#       repository: registry.example.com/myapp/cleanup
#       tag: latest
#     command: ["/bin/sh", "-c", "cleanup.sh"]
#     resources:
#       requests:
#         cpu: 50m
#         memory: 64Mi
#       limits:
#         cpu: 200m
#         memory: 128Mi
#
# sharedVariables:
#   DATABASE_URL: postgres://localhost/myapp
#   REDIS_URL: redis://localhost:6379
#
# config:
#   app-config:
#     APP_ENV: production
#     LOG_LEVEL: info
#
# databases:
#   postgres:
#     main:
#       instances: 1
#       size: 10Gi
#       version: "16"
#   redis:
#     cache:
#       image: redis:7-alpine
#       resources:
#         requests:
#           cpu: 50m
#           memory: 64Mi
#         limits:
#           cpu: 200m
#           memory: 128Mi

services: {}

# registryAuth: OCI registry credentials for kubelet image pulls (imagePullSecrets).
# When set, creates a dockerconfigjson Secret in the namespace.
# registryAuth:
#   host: "10.96.100.100:5000"
#   username: "reader"
#   password: ""

gateway:
  name: lucity-gateway
  namespace: lucity-system

networkPolicy:
  podCIDR: 10.244.0.0/16
  serviceCIDR: 10.96.0.0/12

cronJobs: {}

sharedVariables: {}

config: {}

databases:
  postgres: {}
  redis: {}
