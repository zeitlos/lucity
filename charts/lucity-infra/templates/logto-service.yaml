{{- if .Values.logto.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-logto
  labels:
    app.kubernetes.io/name: logto
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: identity-provider
spec:
  type: {{ .Values.logto.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.logto.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: logto
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
