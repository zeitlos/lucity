{{- if .Values.rybbit.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-rybbit
  labels:
    app.kubernetes.io/name: rybbit
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: analytics
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  hostnames:
    - {{ .Values.rybbit.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ .Release.Name }}-rybbit-backend
          port: {{ .Values.rybbit.backend.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-rybbit-client
          port: {{ .Values.rybbit.client.port }}
{{- end }}
