{{- if and .Values.rauthy.enabled .Values.rauthy.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-rauthy
  labels:
    app.kubernetes.io/name: rauthy
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: identity-provider
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  hostnames:
    - {{ .Values.rauthy.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}-rauthy
          port: {{ .Values.rauthy.service.httpPort }}
{{- end }}
