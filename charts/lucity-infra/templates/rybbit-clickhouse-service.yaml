{{- if .Values.rybbit.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-rybbit-clickhouse
  labels:
    app.kubernetes.io/name: rybbit-clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.rybbit.clickhouse.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: rybbit-clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
