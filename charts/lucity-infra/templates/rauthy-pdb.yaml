{{- if .Values.rauthy.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-rauthy
  labels:
    app.kubernetes.io/name: rauthy
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: identity-provider
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rauthy
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
