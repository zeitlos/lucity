apiVersion: v2
name: lucity-infra
description: Lucity platform infrastructure — OCI registry (Zot), Git server (Soft-serve), GitOps (ArgoCD), and PostgreSQL operator (CNPG)
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: zot
    version: "0.1.104"
    repository: "http://zotregistry.dev/helm-charts"
    condition: zot.enabled
  - name: argo-cd
    version: "9.4.17"
    repository: "https://argoproj.github.io/argo-helm"
    condition: argo-cd.enabled
  - name: cloudnative-pg
    version: "0.28.0"
    repository: "https://cloudnative-pg.github.io/charts"
    condition: cloudnative-pg.enabled
