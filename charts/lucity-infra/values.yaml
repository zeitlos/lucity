# Lucity infrastructure chart — Zot (OCI registry) + Soft-serve (Git server) + ArgoCD (GitOps) + Envoy Gateway (Gateway API) + CNPG (PostgreSQL)

# -- Zot OCI Registry
zot:
  enabled: true
  persistence: false
  pvc:
    create: false
    storage: 8Gi
    storageClassName: null
  service:
    type: ClusterIP
    port: 5000

# -- Soft-serve Git Server
softServe:
  enabled: true
  image:
    repository: charmcli/soft-serve
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    sshPort: 23231
    httpPort: 23232
    statsPort: 23233
    gitPort: 9418
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  # SSH public key for the initial admin user.
  # Generate with: ssh-keygen -t ed25519 -f lucity-admin
  # Then paste the .pub contents here.
  initialAdminKey: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- ArgoCD GitOps Controller
argo-cd:
  enabled: true

  # Single-replica, non-HA, dev-friendly defaults
  global:
    logging:
      format: text
      level: info

  # Disable components we don't need for dev
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false

  # Server: insecure mode (HTTP), ClusterIP
  server:
    replicas: 1
    service:
      type: ClusterIP

  # Controller: single replica
  controller:
    replicas: 1

  # Redis: standard (not HA)
  redis:
    enabled: true
  redis-ha:
    enabled: false

  configs:
    # Run server without TLS (dev only)
    params:
      server.insecure: true

    # Enable admin account, create lucity service account for API tokens
    cm:
      admin.enabled: "true"
      accounts.lucity: apiKey
      timeout.reconciliation: 180s

    # RBAC: give lucity account full app and repo management
    rbac:
      policy.csv: |
        p, role:lucity, applications, *, */*, allow
        p, role:lucity, repositories, *, *, allow
        g, lucity, role:lucity

    # Credential template so ArgoCD trusts any repo on Soft-serve (no auth needed)
    credentialTemplates:
      soft-serve:
        url: http://lucity-infra-soft-serve.lucity-system.svc.cluster.local:23232
        type: git

# -- Gateway resource configuration
# Set enabled: true and configure listeners for your environment.
# className: "eg" for Envoy Gateway, "cilium" for Cilium Gateway API.
gateway:
  enabled: true
  name: lucity-gateway
  className: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80

# -- cert-manager ClusterIssuer resources
clusterIssuers: []

# -- cert-manager Certificate resources
certificates: []

# -- CloudNativePG Operator (PostgreSQL)
cloudnative-pg:
  enabled: true

# -- Rybbit Web Analytics (ClickHouse + CNPG PostgreSQL + Backend + Client)
rybbit:
  enabled: false
  hostname: ""

  backend:
    image:
      repository: ghcr.io/rybbit-io/rybbit-backend
      tag: latest
      pullPolicy: IfNotPresent
    port: 3001
    baseUrl: ""
    disableSignup: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  client:
    image:
      repository: ghcr.io/rybbit-io/rybbit-client
      tag: latest
      pullPolicy: IfNotPresent
    port: 3002
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  clickhouse:
    image:
      repository: clickhouse/clickhouse-server
      tag: "25.4.2"
      pullPolicy: IfNotPresent
    port: 8123
    database: analytics
    user: default
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  postgres:
    instances: 1
    size: 5Gi
    storageClass: ""
    version: "17"
    database: analytics

  secrets:
    clickhousePassword: ""
    betterAuthSecret: ""

# -- Logto Identity Provider (OIDC + Organizations)
logto:
  enabled: false
  image:
    repository: ghcr.io/logto-io/logto
    tag: "1.37.1"
    pullPolicy: IfNotPresent
  endpoint: ""              # public URL, e.g. https://id.lucity.cloud
  postgres:
    instances: 1
    size: 1Gi
    storageClass: ""
    version: "17"
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    # M2M app credentials for Management API access (created in Logto admin console)
    m2mAppId: ""
    m2mAppSecret: ""
    secretVaultKek: ""    # base64-encoded 32-byte KEK for Secret Vault (token storage)

# -- Rauthy Identity Provider (OIDC)
rauthy:
  enabled: true
  image:
    repository: ghcr.io/sebadob/rauthy
    tag: "0.34.3"
    pullPolicy: IfNotPresent
  hostname: ""
  adminEmail: admin@localhost
  trustedProxies: "10.0.0.0/8"
  service:
    type: ClusterIP
    httpPort: 8080
    httpsPort: 8443
  persistence:
    size: 128Mi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  secrets:
    adminPassword: ""       # BOOTSTRAP_ADMIN_PASSWORD_PLAIN (first run only)
    raftSecret: ""           # cluster.secret_raft (min 16 chars)
    apiSecret: ""            # cluster.secret_api (min 16 chars)
    encryptionKey: ""        # format: "hexId/base64Key" (32 bytes)
    encryptionKeyId: ""      # hex prefix from encryptionKey
