{{- if .Values.routes.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lucity.fullname" . }}-platform
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.routes.gatewayName }}
      namespace: {{ .Values.routes.gatewayNamespace }}
  hostnames:
    - {{ .Values.routes.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /graphql
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /playground
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /version
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /app
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-dashboard
          port: 80
    {{- if .Values.cashier.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /webhooks/stripe
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-cashier
          port: {{ .Values.cashier.webhookPort }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /webhooks
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-webhook
          port: 9004
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "lucity.fullname" . }}-docs
          port: 80
{{- end }}
