# ServiceAccounts for services that do NOT need Kubernetes API access.
# automountServiceAccountToken is disabled to prevent unnecessary token mounting.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lucity.fullname" . }}-gateway
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lucity.fullname" . }}-packager
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: packager
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lucity.fullname" . }}-webhook
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lucity.fullname" . }}-dashboard
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lucity.fullname" . }}-docs
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
automountServiceAccountToken: false
