{{- if .Values.builder.serviceAccount.create }}
{{- $buildNamespace := .Values.builder.buildNamespace | default "lucity-builds" }}
# Default deny-all for build pods: no ingress, restricted egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lucity.fullname" . }}-builds-default-deny
  namespace: {{ $buildNamespace }}
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
# Build pods: allow egress to DNS, BuildKit, registry, and internet only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lucity.fullname" . }}-builds-egress
  namespace: {{ $buildNamespace }}
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      lucity.dev/component: build
  policyTypes:
    - Egress
  egress:
    # DNS (CoreDNS in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # BuildKit (in lucity-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "lucity.selectorLabels" (dict "name" "buildkit" "release" .Release.Name) | nindent 14 }}
      ports:
        - port: 1234
          protocol: TCP
    # OCI registry / Zot (in lucity-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: zot
      ports:
        - port: 5000
          protocol: TCP
    # Internet (for cloning from GitHub) — exclude cluster-internal CIDRs
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - {{ .Values.builder.podCIDR | default "10.244.0.0/16" }}
              - {{ .Values.builder.serviceCIDR | default "10.96.0.0/12" }}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- end }}
