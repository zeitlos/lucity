{{- if and .Values.builder.serviceAccount.create .Values.secrets.REGISTRY_PASSWORD }}
{{- $ns := .Values.builder.buildNamespace | default "lucity-builds" }}
{{- $host := .Values.builder.registryHost | default "lucity-infra-zot.lucity-system.svc.cluster.local:5000" }}
{{- $user := .Values.builder.registryUsername | default "builder" }}
{{- $pass := index .Values.secrets "REGISTRY_PASSWORD" }}
{{- $auth := printf "%s:%s" $user $pass | b64enc }}
{{- $dockerConfig := printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" $host $auth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lucity.fullname" . }}-registry-auth
  namespace: {{ $ns }}
  labels:
    {{- include "lucity.labels" . | nindent 4 }}
    app.kubernetes.io/component: builder
type: Opaque
stringData:
  config.json: {{ $dockerConfig | quote }}
{{- end }}
