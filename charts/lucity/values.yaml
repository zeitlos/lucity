# -- Shared secrets (stored in a single K8s Secret)
secrets: {}
  # GITHUB_CLIENT_SECRET: ""
  # GITHUB_WEBHOOK_SECRET: ""
  # ARGOCD_TOKEN: ""
  # SOFTSERVE_TOKEN: ""
  # LOGTO_OIDC_CLIENT_ID: ""
  # LOGTO_M2M_APP_ID: ""
  # LOGTO_M2M_APP_SECRET: ""

# -- GitHub App private key (mounted as file)
githubPrivateKey: ""

# -- Soft-serve admin SSH key (mounted as file)
softserveKey: ""

# -- Registry pull credentials for workload imagePullSecrets.
# The deployer clones this Secret into each workload namespace so kubelet
# can authenticate to the OCI registry when pulling images.
registryPull:
  host: ""
  username: ""
  password: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Shared config (stored in a ConfigMap)
config: {}

# -- Platform routing via Gateway API
routes:
  enabled: false
  gatewayName: lucity-gateway
  gatewayNamespace: lucity-system
  hostname: lucity.cloud

# -- Gateway (GraphQL API)
gateway:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/gateway
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Builder (source-to-image)
builder:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/builder
    tag: ""
    pullPolicy: IfNotPresent
  port: 9001
  env: {}
  envSecret: {}
  serviceAccount:
    create: false
  # -- Namespace for BuildKit and build Jobs (isolated from platform services)
  buildNamespace: lucity-builds
  # -- Registry host for BuildKit config (used in buildkitd.toml for build Jobs)
  registryHost: ""
  # -- BuildKit image (used by the persistent BuildKit Deployment)
  buildkitImage: moby/buildkit:v0.28.0-rootless
  # -- Persistent BuildKit daemon settings (shared across all builds)
  buildkit:
    storageSize: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 4Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Packager (GitOps repo management)
packager:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/packager
    tag: ""
    pullPolicy: IfNotPresent
  port: 9002
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Deployer (ArgoCD lifecycle)
deployer:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/deployer
    tag: ""
    pullPolicy: IfNotPresent
  port: 9003
  env: {}
  envSecret: {}
  serviceAccount:
    create: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Webhook (GitHub event routing)
webhook:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/webhook
    tag: ""
    pullPolicy: IfNotPresent
  port: 9004
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Cashier (Stripe billing)
cashier:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/cashier
    tag: ""
    pullPolicy: IfNotPresent
  port: 9005
  webhookPort: 9006
  serviceAccount:
    create: true
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Dashboard (Vue SPA)
dashboard:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/dashboard
    tag: ""
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Network policy settings for build isolation
networkPolicy:
  # -- Kubernetes pod CIDR (used to block cluster-internal egress from builds)
  podCIDR: 10.244.0.0/16
  # -- Kubernetes service CIDR (used to block cluster-internal egress from builds)
  serviceCIDR: 10.96.0.0/12

# -- Docs
docs:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/docs
    tag: ""
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
