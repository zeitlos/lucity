# -- Shared secrets (stored in a single K8s Secret)
secrets: {}
  # JWT_SECRET: ""
  # GITHUB_CLIENT_SECRET: ""
  # GITHUB_WEBHOOK_SECRET: ""
  # ARGOCD_TOKEN: ""
  # SOFTSERVE_TOKEN: ""

# -- GitHub App private key (mounted as file)
githubPrivateKey: ""

# -- Soft-serve admin SSH key (mounted as file)
softserveKey: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Shared config (stored in a ConfigMap)
config: {}

# -- Platform routing via Gateway API
routes:
  enabled: false
  gatewayName: lucity-gateway
  gatewayNamespace: lucity-system
  hostname: lucity.cloud

# -- Gateway (GraphQL API)
gateway:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/gateway
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Builder (source-to-image)
builder:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/builder
    tag: ""
    pullPolicy: IfNotPresent
  port: 9001
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Packager (GitOps repo management)
packager:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/packager
    tag: ""
    pullPolicy: IfNotPresent
  port: 9002
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Deployer (ArgoCD lifecycle)
deployer:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/deployer
    tag: ""
    pullPolicy: IfNotPresent
  port: 9003
  env: {}
  envSecret: {}
  serviceAccount:
    create: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Webhook (GitHub event routing)
webhook:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/webhook
    tag: ""
    pullPolicy: IfNotPresent
  port: 9004
  env: {}
  envSecret: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Dashboard (Vue SPA)
dashboard:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/dashboard
    tag: ""
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Docs
docs:
  replicaCount: 1
  image:
    repository: ghcr.io/zeitlos/lucity/docs
    tag: ""
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
