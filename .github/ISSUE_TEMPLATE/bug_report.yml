name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Affected service
      options:
        - Gateway
        - Builder
        - Packager
        - Deployer
        - Webhook
        - Dashboard
        - Helm chart
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, error messages, or attach screenshots.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kubernetes version, Lucity version, OS, etc.
      placeholder: |
        - Lucity version:
        - Kubernetes:
        - OS:
    validations:
      required: false
