root = "."
tmp_dir = "../../tmp/air/cashier"
env_files = [".env"]

[build]
  bin = "../../tmp/air/cashier/cashier"
  cmd = "go build -o ../../tmp/air/cashier/cashier ./cmd/cashier/..."
  delay = 1000
  exclude_dir = ["node_modules", "tmp", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "env"]
  include_dir = [".", "../../pkg/cashier", "../../pkg/graceful", "../../pkg/logger"]
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = false
