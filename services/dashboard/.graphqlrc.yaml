overwrite: true
schema: "../gateway/graphql/schema/*.graphqls"
documents:
  - "./src/**/*.vue"
  - "./src/**/*.ts"
generates:
  src/gql/:
    preset: "client"
    plugins: []
    config:
      useTypeImports: true
    presetConfig:
      fragmentMasking: false
  ./graphql.schema.json:
    plugins:
      - "introspection"
