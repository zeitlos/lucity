root = "."
tmp_dir = "../../tmp/air/gateway"
env_files = [".env"]

[build]
  bin = "../../tmp/air/gateway/gateway"
  cmd = "go build -o ../../tmp/air/gateway/gateway ./cmd/gateway/..."
  delay = 1000
  exclude_dir = ["node_modules", "tmp", "vendor"]
  exclude_regex = ["_test\\.go$", "\\.gen\\.go$", "generated\\.go$"]
  include_ext = ["go", "env"]
  include_dir = [".", "../../pkg/auth", "../../pkg/builder", "../../pkg/packager", "../../pkg/graceful", "../../pkg/logger"]
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = false
