syntax = "proto3";

package packager;

import "google/protobuf/timestamp.proto";

option go_package = "./packager";

service PackagerService {
  // InitProject creates a new GitOps repository for a project.
  rpc InitProject(InitProjectRequest) returns (InitProjectResponse);

  // ListProjects returns all projects managed by the packager.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // GetProject returns a single project by name.
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // DeleteProject removes a project and its GitOps repository.
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // AddService adds a service definition to the project's base values.
  rpc AddService(AddServiceRequest) returns (AddServiceResponse);

  // RemoveService removes a service definition from the project's base values.
  rpc RemoveService(RemoveServiceRequest) returns (RemoveServiceResponse);

  // UpdateImageTag updates the image tag for a service in a specific environment.
  rpc UpdateImageTag(UpdateImageTagRequest) returns (UpdateImageTagResponse);

  // CreateEnvironment creates a new environment in the GitOps repo.
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);

  // DeleteEnvironment removes an environment from the GitOps repo.
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (DeleteEnvironmentResponse);

  // Promote copies an image tag from one environment to another.
  rpc Promote(PromoteRequest) returns (PromoteResponse);

  // Eject exports the complete project configuration for independent operation.
  rpc Eject(EjectRequest) returns (EjectResponse);

  // DeploymentHistory returns the deployment history for a service in an environment.
  rpc DeploymentHistory(DeploymentHistoryRequest) returns (DeploymentHistoryResponse);

  // AddDomain adds a domain hostname to a service in an environment.
  rpc AddDomain(AddDomainRequest) returns (AddDomainResponse);

  // RemoveDomain removes a domain hostname from a service in an environment.
  rpc RemoveDomain(RemoveDomainRequest) returns (RemoveDomainResponse);

  // AllDomains returns all domain hostnames across all projects and environments (for collision detection).
  rpc AllDomains(AllDomainsRequest) returns (AllDomainsResponse);

  // SharedVariables returns all shared variables for an environment.
  rpc SharedVariables(SharedVariablesRequest) returns (SharedVariablesResponse);

  // SetSharedVariables replaces all shared variables for an environment.
  // Also propagates changes to any services that reference shared vars via sharedRefs.
  rpc SetSharedVariables(SetSharedVariablesRequest) returns (SetSharedVariablesResponse);

  // ServiceVariables returns all variables for a service in an environment.
  rpc ServiceVariables(ServiceVariablesRequest) returns (ServiceVariablesResponse);

  // SetServiceVariables replaces all variables for a service in an environment.
  // Shared refs are resolved from the environment's shared variables.
  rpc SetServiceVariables(SetServiceVariablesRequest) returns (SetServiceVariablesResponse);

  // AddDatabase adds a PostgreSQL database definition to the project's base values.
  rpc AddDatabase(AddDatabaseRequest) returns (AddDatabaseResponse);

  // RemoveDatabase removes a PostgreSQL database from the project's base values.
  rpc RemoveDatabase(RemoveDatabaseRequest) returns (RemoveDatabaseResponse);

  // SyncChart updates the embedded lucity-app Helm chart in the project's GitOps repo.
  // Called to propagate chart template changes (e.g., new Gateway config) to existing repos.
  rpc SyncChart(SyncChartRequest) returns (SyncChartResponse);

  // SetResources writes resource requests/limits to an environment's values.yaml.
  // Keeps the GitOps repo in sync with K8s ResourceQuota for ejection purposes.
  rpc SetResources(SetResourcesRequest) returns (SetResourcesResponse);

  // SetServiceScaling writes replica count and autoscaling config to an environment's values.yaml.
  rpc SetServiceScaling(SetServiceScalingRequest) returns (SetServiceScalingResponse);

  // SetCustomStartCommand sets or clears the custom start command for a service in base values.
  rpc SetCustomStartCommand(SetCustomStartCommandRequest) returns (SetCustomStartCommandResponse);

  // SetSuspended writes or removes the suspended flag in an environment's values.yaml.
  rpc SetSuspended(SetSuspendedRequest) returns (SetSuspendedResponse);
}

// ServiceInfo describes a service configured in the project's GitOps repo.
message ServiceInfo {
  string name = 1;
  string image = 2;       // image repository path (e.g., localhost:5000/myapp/api)
  int32 port = 3;
  reserved 4;
  reserved "public";
  string framework = 5;   // detected framework for dashboard icons (e.g., "nextjs", "vite")
  string source_url = 6;     // GitHub repo URL for this service
  string context_path = 7;   // subdirectory within the repo (monorepo support)
  int64 github_installation_id = 8; // GitHub App installation that owns this repo
  string custom_start_command = 9;  // shell command to start the service (overrides image entrypoint)
  string start_command = 10;        // auto-detected start command from railpack (default if no custom override)
}

// ServiceInstanceInfo describes a service's state in a specific environment.
// Includes both definition fields (from base) and runtime fields (from env).
message ServiceInstanceInfo {
  string name = 1;
  string image_tag = 2;       // current image tag in this environment's values.yaml
  repeated string domains = 3; // domain hostnames from this environment's values.yaml
  string image = 4;            // image repository path (e.g., localhost:5000/myapp/api)
  int32 port = 5;
  string framework = 6;       // detected framework for dashboard icons (e.g., "nextjs", "vite")
  string source_url = 7;      // GitHub repo URL for this service
  string context_path = 8;    // subdirectory within the repo (monorepo support)
  int64 github_installation_id = 9;
  string custom_start_command = 10;
  string start_command = 11;   // auto-detected start command from railpack
}

// EnvironmentInfo holds metadata about a project environment.
message EnvironmentInfo {
  string name = 1;
  repeated ServiceInstanceInfo services = 2;
}

// ProjectInfo holds metadata about a project read from its GitOps repo.
message ProjectInfo {
  string name = 1;           // org-scoped: "zeitlos/myapp"
  reserved 2;
  reserved "source_url";
  string gitops_repo_url = 3;
  repeated string environments = 4;
  google.protobuf.Timestamp created_at = 5;
  reserved 6;
  reserved "services";
  repeated EnvironmentInfo environment_infos = 7;  // per-environment service state
  repeated DatabaseInfo databases = 8;     // base database definitions
  string display_name = 9;                // human-readable project name (from Soft-serve repo metadata)
}

message InitProjectRequest {
  string project = 1;
  reserved 2;
  reserved "source_url";
  string display_name = 3;  // human-readable project name
}

message InitProjectResponse {
  string gitops_repo_url = 1;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated ProjectInfo projects = 1;
}

message GetProjectRequest {
  string project = 1;
}

message GetProjectResponse {
  ProjectInfo project = 1;
}

message DeleteProjectRequest {
  string project = 1;
}

message DeleteProjectResponse {}

message AddServiceRequest {
  string project = 1;
  string service = 2;
  string image = 3;
  int32 port = 4;
  reserved 5;
  reserved "public";
  string framework = 6;
  string source_url = 7;     // GitHub repo URL for this service
  string context_path = 8;   // subdirectory within the repo (monorepo support)
  int64 github_installation_id = 9; // GitHub App installation that owns this repo
  string image_tag = 10;             // initial image tag (default: "latest")
  string image_pull_policy = 11;     // "Always", "IfNotPresent", or "" (chart default)
  string custom_start_command = 12;  // shell command to start the service (overrides image entrypoint)
  string start_command = 13;         // auto-detected start command from railpack (stored for UI placeholder)
  string environment = 14;           // target environment for the service
}

message AddServiceResponse {}

message RemoveServiceRequest {
  string project = 1;
  string service = 2;
  string environment = 3;
}

message RemoveServiceResponse {}

message UpdateImageTagRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  string tag = 4;
  string digest = 5;
  // Commit message prefix: "deploy" (default), "rollback", etc.
  string commit_prefix = 6;
}

message UpdateImageTagResponse {}

message CreateEnvironmentRequest {
  string project = 1;
  string environment = 2;
  // Source environment to copy configuration from.
  string from_environment = 3;
  reserved 4;
  reserved "ephemeral";
  // Workload domain for generating platform domains (e.g., "lucity.local").
  // Only used when from_environment is set.
  string workload_domain = 5;
}

message CreateEnvironmentResponse {
  string namespace = 1;
  // Service names that received new platform domains.
  repeated string services_with_domains = 2;
}

message DeleteEnvironmentRequest {
  string project = 1;
  string environment = 2;
}

message DeleteEnvironmentResponse {}

message PromoteRequest {
  string project = 1;
  string service = 2;
  string from_environment = 3;
  string to_environment = 4;
}

message PromoteResponse {
  string image_tag = 1;
}

message EjectRequest {
  string project = 1;
}

message EjectResponse {
  // Base64-encoded tar.gz of the ejected project.
  bytes archive = 1;
}

message DeploymentHistoryRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
}

message DeploymentHistoryEntry {
  string image_tag = 1;
  string revision = 2;       // git commit SHA
  google.protobuf.Timestamp deployed_at = 3;
  string author = 4;
}

message DeploymentHistoryResponse {
  repeated DeploymentHistoryEntry entries = 1;
}

message AddDomainRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  string hostname = 4;
}

message AddDomainResponse {}

message RemoveDomainRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  string hostname = 4;
}

message RemoveDomainResponse {}

message AllDomainsRequest {}

message AllDomainsResponse {
  repeated string hostnames = 1;
}

// --- Variable management ---

message SharedVariablesRequest {
  string project = 1;
  string environment = 2;
}

message SharedVariablesResponse {
  map<string, string> variables = 1;
}

message SetSharedVariablesRequest {
  string project = 1;
  string environment = 2;
  map<string, string> variables = 3;
}

message SetSharedVariablesResponse {}

message ServiceVariablesRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
}

message ServiceVariablesResponse {
  map<string, string> variables = 1;
  repeated string shared_refs = 2;  // keys in variables that reference shared vars
  map<string, DatabaseRef> database_refs = 3;  // env var name -> database secret reference
  map<string, ServiceRef> service_refs = 4;    // env var name -> service URL reference
}

message SetServiceVariablesRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  map<string, string> variables = 4;     // direct variable values
  repeated string shared_refs = 5;       // keys to resolve from shared variables
  map<string, DatabaseRef> database_refs = 6;  // env var name -> database secret reference
  map<string, ServiceRef> service_refs = 7;    // env var name -> service URL reference
}

message SetServiceVariablesResponse {}

// DatabaseRef references a key in a CNPG-generated Kubernetes Secret.
message DatabaseRef {
  string database = 1;  // database name (e.g., "main")
  string key = 2;       // CNPG secret key: "uri", "host", "port", "dbname", "user", "password"
}

// ServiceRef references another service's internal URL (computed by Helm template).
message ServiceRef {
  string service = 1;   // service name (e.g., "api")
}

// --- Database management ---

// DatabaseInfo describes a PostgreSQL database configured in the project's GitOps repo.
message DatabaseInfo {
  string name = 1;       // e.g., "main", "analytics"
  string version = 2;    // PostgreSQL version, e.g., "16"
  int32 instances = 3;   // CNPG cluster instances
  string size = 4;       // storage size, e.g., "10Gi"
}

message AddDatabaseRequest {
  string project = 1;
  string name = 2;       // database name (e.g., "main")
  string version = 3;    // optional, defaults to "16"
  int32 instances = 4;   // optional, defaults to 1
  string size = 5;       // optional, defaults to "10Gi"
}

message AddDatabaseResponse {}

message RemoveDatabaseRequest {
  string project = 1;
  string name = 2;
}

message RemoveDatabaseResponse {}

message SyncChartRequest {
  string project = 1;
}

message SyncChartResponse {}

message SetResourcesRequest {
  string project = 1;
  string environment = 2;
  string tier = 3;            // "eco" or "production"
  int32 cpu_millicores = 4;
  int32 memory_mb = 5;
  int32 disk_mb = 6;
}

message SetResourcesResponse {}

message SetServiceScalingRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  int32 replicas = 4;
  PackagerAutoscalingConfig autoscaling = 5;
}

message PackagerAutoscalingConfig {
  bool enabled = 1;
  int32 min_replicas = 2;
  int32 max_replicas = 3;
  int32 target_cpu = 4;
}

message SetServiceScalingResponse {}

message SetCustomStartCommandRequest {
  string project = 1;
  string service = 2;
  string command = 3;  // empty string clears the custom command
  string environment = 4;
}

message SetCustomStartCommandResponse {}

message SetSuspendedRequest {
  string project = 1;
  string environment = 2;
  bool suspended = 3;
}

message SetSuspendedResponse {}
