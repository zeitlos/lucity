syntax = "proto3";

package deployer;

option go_package = "./deployer";

service DeployerService {
  // DeployEnvironment creates a deployment for an environment.
  rpc DeployEnvironment(DeployEnvironmentRequest) returns (DeployEnvironmentResponse);

  // RemoveDeployment removes the deployment for an environment.
  rpc RemoveDeployment(RemoveDeploymentRequest) returns (RemoveDeploymentResponse);

  // GetDeploymentStatus returns the current deployment status of an environment.
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);

  // SyncDeployment triggers a sync for an environment's deployment.
  rpc SyncDeployment(SyncDeploymentRequest) returns (SyncDeploymentResponse);

  // DeleteRepository removes the ArgoCD repository credential for a project.
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteRepositoryResponse);

  // ServiceLogs streams real-time stdout/stderr from running pods for a service.
  rpc ServiceLogs(ServiceLogsRequest) returns (stream ServiceLogEntry);

  // DatabaseTables returns the tables and their schema for a database.
  rpc DatabaseTables(DatabaseTablesRequest) returns (DatabaseTablesResponse);

  // DatabaseTableData returns paginated rows from a table.
  rpc DatabaseTableData(DatabaseTableDataRequest) returns (DatabaseTableDataResponse);

  // DatabaseQuery executes an arbitrary SQL query and returns results.
  rpc DatabaseQuery(DatabaseQueryRequest) returns (DatabaseQueryResponse);
}

message DeployEnvironmentRequest {
  string project = 1;
  string environment = 2;
  string gitops_repo_url = 3;
  string target_namespace = 4;
}

message DeployEnvironmentResponse {
  string deployment_name = 1;
}

message RemoveDeploymentRequest {
  string project = 1;
  string environment = 2;
}

message RemoveDeploymentResponse {}

message GetDeploymentStatusRequest {
  string project = 1;
  string environment = 2;
}

message GetDeploymentStatusResponse {
  DeploymentStatus status = 1;
  string message = 2;
}

enum DeploymentStatus {
  DEPLOYMENT_STATUS_UNSPECIFIED = 0;
  DEPLOYMENT_STATUS_SYNCED = 1;
  DEPLOYMENT_STATUS_OUT_OF_SYNC = 2;
  DEPLOYMENT_STATUS_PROGRESSING = 3;
  DEPLOYMENT_STATUS_DEGRADED = 4;
  DEPLOYMENT_STATUS_UNKNOWN = 5;
}

message SyncDeploymentRequest {
  string project = 1;
  string environment = 2;
}

message SyncDeploymentResponse {
  DeploymentStatus status = 1;
}

message DeleteRepositoryRequest {
  string project = 1;
}

message DeleteRepositoryResponse {}

message ServiceLogsRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  // Number of recent log lines to include at the start. 0 = no history.
  int32 tail_lines = 4;
}

message ServiceLogEntry {
  // Log line text.
  string line = 1;
  // Pod name that produced this line.
  string pod = 2;
}

// Database exploration messages.

message DatabaseTablesRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
}

message DatabaseTablesResponse {
  repeated DatabaseTable tables = 1;
}

message DatabaseTable {
  string name = 1;
  string schema = 2;
  int64 estimated_rows = 3;
  repeated DatabaseColumn columns = 4;
}

message DatabaseColumn {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  bool primary_key = 4;
}

message DatabaseTableDataRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
  string table = 4;
  string schema = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message DatabaseTableDataResponse {
  repeated string columns = 1;
  repeated DatabaseRow rows = 2;
  int64 total_estimated_rows = 3;
}

message DatabaseRow {
  repeated DatabaseCell cells = 1;
}

message DatabaseCell {
  string value = 1;
  bool is_null = 2;
}

message DatabaseQueryRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
  string query = 4;
}

message DatabaseQueryResponse {
  repeated string columns = 1;
  repeated DatabaseRow rows = 2;
  int64 affected_rows = 3;
}
