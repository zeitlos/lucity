syntax = "proto3";

package deployer;

option go_package = "./deployer";

service DeployerService {
  // DeployEnvironment creates a deployment for an environment.
  rpc DeployEnvironment(DeployEnvironmentRequest) returns (DeployEnvironmentResponse);

  // RemoveDeployment removes the deployment for an environment.
  rpc RemoveDeployment(RemoveDeploymentRequest) returns (RemoveDeploymentResponse);

  // GetDeploymentStatus returns the current deployment status of an environment.
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);

  // SyncDeployment triggers a sync for an environment's deployment.
  rpc SyncDeployment(SyncDeploymentRequest) returns (SyncDeploymentResponse);

  // DeleteRepository removes the ArgoCD repository credential for a project.
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteRepositoryResponse);

  // ServiceLogs streams real-time stdout/stderr from running pods for a service.
  rpc ServiceLogs(ServiceLogsRequest) returns (stream ServiceLogEntry);

  // DatabaseTables returns the tables and their schema for a database.
  rpc DatabaseTables(DatabaseTablesRequest) returns (DatabaseTablesResponse);

  // DatabaseTableData returns paginated rows from a table.
  rpc DatabaseTableData(DatabaseTableDataRequest) returns (DatabaseTableDataResponse);

  // DatabaseQuery executes an arbitrary SQL query and returns results.
  rpc DatabaseQuery(DatabaseQueryRequest) returns (DatabaseQueryResponse);

  // DatabaseStatus returns the runtime status of a database in an environment.
  rpc DatabaseStatus(DatabaseStatusRequest) returns (DatabaseStatusResponse);

  // ServiceStatus returns the runtime status of a service's K8s Deployment in an environment.
  rpc ServiceStatus(ServiceStatusRequest) returns (ServiceStatusResponse);

  // SetServiceScaling sets the replica count or creates/updates an HPA for a service.
  rpc SetServiceScaling(SetServiceScalingRequest) returns (SetServiceScalingResponse);

  // DatabaseCredentials returns the resolved connection credentials for a database.
  rpc DatabaseCredentials(DatabaseCredentialsRequest) returns (DatabaseCredentialsResponse);

  // WorkspaceByInstallationID finds a workspace by its GitHub App installation ID.
  rpc WorkspaceByInstallationID(WorkspaceByInstallationIDRequest) returns (WorkspaceByInstallationIDResponse);

  // SetResourceQuota creates or updates a ResourceQuota, LimitRange, and tier label on a namespace.
  rpc SetResourceQuota(SetResourceQuotaRequest) returns (SetResourceQuotaResponse);

  // ResourceQuota returns the current resource quota and tier for an environment namespace.
  rpc ResourceQuota(ResourceQuotaRequest) returns (ResourceQuotaResponse);

  // ListResourceAllocations returns resource quotas and tiers for all managed namespaces.
  rpc ListResourceAllocations(ListResourceAllocationsRequest) returns (ListResourceAllocationsResponse);

  // StoreUserGitHubToken stores a GitHub OAuth token for a user in a K8s Secret.
  rpc StoreUserGitHubToken(StoreUserGitHubTokenRequest) returns (StoreUserGitHubTokenResponse);

  // UserGitHubToken retrieves a user's stored GitHub OAuth token.
  rpc UserGitHubToken(UserGitHubTokenRequest) returns (UserGitHubTokenResponse);

  // DeleteUserGitHubToken removes a user's stored GitHub OAuth token.
  rpc DeleteUserGitHubToken(DeleteUserGitHubTokenRequest) returns (DeleteUserGitHubTokenResponse);

  // SuspendWorkspace suspends or resumes all workloads in a workspace.
  rpc SuspendWorkspace(SuspendWorkspaceRequest) returns (SuspendWorkspaceResponse);
}

message DeployEnvironmentRequest {
  string project = 1;
  string environment = 2;
  string gitops_repo_url = 3;
  string target_namespace = 4;
}

message DeployEnvironmentResponse {
  string deployment_name = 1;
}

message RemoveDeploymentRequest {
  string project = 1;
  string environment = 2;
}

message RemoveDeploymentResponse {}

message GetDeploymentStatusRequest {
  string project = 1;
  string environment = 2;
}

message GetDeploymentStatusResponse {
  DeploymentStatus status = 1;
  string message = 2;
}

enum DeploymentStatus {
  DEPLOYMENT_STATUS_UNSPECIFIED = 0;
  DEPLOYMENT_STATUS_SYNCED = 1;
  DEPLOYMENT_STATUS_OUT_OF_SYNC = 2;
  DEPLOYMENT_STATUS_PROGRESSING = 3;
  DEPLOYMENT_STATUS_DEGRADED = 4;
  DEPLOYMENT_STATUS_UNKNOWN = 5;
}

message SyncDeploymentRequest {
  string project = 1;
  string environment = 2;
}

message SyncDeploymentResponse {
  DeploymentStatus status = 1;
}

message DeleteRepositoryRequest {
  string project = 1;
}

message DeleteRepositoryResponse {}

message ServiceLogsRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  // Number of recent log lines to include at the start. 0 = no history.
  int32 tail_lines = 4;
}

message ServiceLogEntry {
  // Log line text.
  string line = 1;
  // Pod name that produced this line.
  string pod = 2;
}

// Database exploration messages.

message DatabaseTablesRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
}

message DatabaseTablesResponse {
  repeated DatabaseTable tables = 1;
}

message DatabaseTable {
  string name = 1;
  string schema = 2;
  int64 estimated_rows = 3;
  repeated DatabaseColumn columns = 4;
}

message DatabaseColumn {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  bool primary_key = 4;
}

message DatabaseTableDataRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
  string table = 4;
  string schema = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message DatabaseTableDataResponse {
  repeated string columns = 1;
  repeated DatabaseRow rows = 2;
  int64 total_estimated_rows = 3;
}

message DatabaseRow {
  repeated DatabaseCell cells = 1;
}

message DatabaseCell {
  string value = 1;
  bool is_null = 2;
}

message DatabaseQueryRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
  string query = 4;
}

message DatabaseQueryResponse {
  repeated string columns = 1;
  repeated DatabaseRow rows = 2;
  int64 affected_rows = 3;
}

// Database status messages.

message DatabaseStatusRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
}

message DatabaseStatusResponse {
  bool ready = 1;
  int32 instances = 2;
  VolumeInfo volume = 3;
}

message VolumeInfo {
  string name = 1;
  string size = 2;
  string requested_size = 3;
  int64 used_bytes = 4;
  int64 capacity_bytes = 5;
}

// Service status messages.

message ServiceStatusRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
}

message ServiceStatusResponse {
  bool ready = 1;
  int32 replicas = 2;
  int32 ready_replicas = 3;
  ServiceScalingConfig scaling = 4;
  ServiceResourceConfig resources = 5;
}

message ServiceResourceConfig {
  int32 cpu_millicores = 1;       // CPU request in millicores (e.g. 250 = 0.25 vCPU)
  int32 memory_mb = 2;            // Memory request in MB
  int32 cpu_limit_millicores = 3; // CPU limit in millicores
  int32 memory_limit_mb = 4;      // Memory limit in MB
}

message ServiceScalingConfig {
  int32 replicas = 1;
  bool autoscaling_enabled = 2;
  int32 min_replicas = 3;
  int32 max_replicas = 4;
  int32 target_cpu = 5;
}

// Service scaling messages.

message SetServiceScalingRequest {
  string project = 1;
  string environment = 2;
  string service = 3;
  int32 replicas = 4;
  DeployerAutoscalingConfig autoscaling = 5;
}

message DeployerAutoscalingConfig {
  bool enabled = 1;
  int32 min_replicas = 2;
  int32 max_replicas = 3;
  int32 target_cpu = 4;
}

message SetServiceScalingResponse {}

// Database credentials messages.

message DatabaseCredentialsRequest {
  string project = 1;
  string environment = 2;
  string database = 3;
}

message DatabaseCredentialsResponse {
  string host = 1;
  string port = 2;
  string dbname = 3;
  string user = 4;
  string password = 5;
  string uri = 6;
}

message WorkspaceByInstallationIDRequest {
  int64 installation_id = 1;
}

message WorkspaceByInstallationIDResponse {
  string workspace = 1;
}

// Resource quota messages.

enum ResourceTier {
  RESOURCE_TIER_UNSPECIFIED = 0;
  RESOURCE_TIER_ECO = 1;
  RESOURCE_TIER_PRODUCTION = 2;
}

message SetResourceQuotaRequest {
  string project = 1;
  string environment = 2;
  ResourceTier tier = 3;
  int32 cpu_millicores = 4;
  int32 memory_mb = 5;
  int32 disk_mb = 6;
}

message SetResourceQuotaResponse {
  ResourceTier tier = 1;
  int32 cpu_millicores = 2;
  int32 memory_mb = 3;
  int32 disk_mb = 4;
}

message ResourceQuotaRequest {
  string project = 1;
  string environment = 2;
}

message ResourceQuotaResponse {
  ResourceTier tier = 1;
  int32 cpu_millicores = 2;
  int32 memory_mb = 3;
  int32 disk_mb = 4;
}

message ListResourceAllocationsRequest {}

message ResourceAllocation {
  string workspace = 1;
  string project = 2;
  string environment = 3;
  ResourceTier tier = 4;
  int32 cpu_millicores = 5;
  int32 memory_mb = 6;
  int32 disk_mb = 7;
}

message ListResourceAllocationsResponse {
  repeated ResourceAllocation allocations = 1;
}

// User GitHub token messages.

message StoreUserGitHubTokenRequest {
  string user_id = 1;         // OIDC subject ID
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;       // Unix timestamp
}

message StoreUserGitHubTokenResponse {}

message UserGitHubTokenRequest {
  string user_id = 1;
}

message UserGitHubTokenResponse {
  bool connected = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;
}

message DeleteUserGitHubTokenRequest {
  string user_id = 1;
}

message DeleteUserGitHubTokenResponse {}

// Workspace suspension messages.

message SuspendWorkspaceRequest {
  string workspace = 1;
  bool suspended = 2;
}

message SuspendWorkspaceResponse {}

