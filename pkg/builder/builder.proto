syntax = "proto3";

package builder;

option go_package = "./builder";

service BuilderService {
  // DetectServices scans a source repository and returns detected services
  // with their language, framework, and suggested configuration.
  rpc DetectServices(DetectServicesRequest) returns (DetectServicesResponse);

  // StartBuild starts an asynchronous container image build from source code
  // using railpack and returns a build ID for status polling.
  rpc StartBuild(StartBuildRequest) returns (StartBuildResponse);

  // BuildStatus returns the current status of an in-progress or completed build.
  rpc BuildStatus(BuildStatusRequest) returns (BuildStatusResponse);

  // BuildLogs streams build log lines in real time. Sends existing lines from
  // the given offset, then continues streaming new lines until the build completes.
  rpc BuildLogs(BuildLogsRequest) returns (stream BuildLogEntry);

  // DeleteImages removes all OCI images for a project from the registry.
  rpc DeleteImages(DeleteImagesRequest) returns (DeleteImagesResponse);
}

message DetectServicesRequest {
  // URL of the source repository to scan.
  string source_url = 1;

  // Git ref to scan (branch, tag, or commit SHA). Empty means default branch.
  string git_ref = 2;
}

message DetectServicesResponse {
  repeated DetectedService services = 1;
}

message DetectedService {
  // Suggested service name (e.g., "web").
  string name = 1;

  // Language provider that matched (e.g., "node", "go", "python").
  string provider = 2;

  // Detected framework (e.g., "nextjs", "vite", "nuxt", "django", "rails").
  string framework = 3;

  // Detected start command from the build plan.
  string start_command = 4;

  // Suggested port based on framework heuristics.
  int32 suggested_port = 5;
}

message StartBuildRequest {
  // URL of the source repository to build from.
  string source_url = 1;

  // Git ref to build (branch, tag, or commit SHA). Empty means default branch.
  string git_ref = 2;

  // Name of the service within the project.
  string service = 3;

  // Full image repository path (e.g., localhost:5000/myapp/api).
  string registry = 4;

  // Path to the build context within the repo. Empty means repository root.
  string context_path = 5;
}

message StartBuildResponse {
  // Unique build ID for polling status.
  string build_id = 1;
}

message BuildStatusRequest {
  string build_id = 1;
}

message BuildStatusResponse {
  BuildPhase phase = 1;

  // Full image reference, set when phase is SUCCEEDED.
  string image_ref = 2;

  // Image digest (e.g., sha256:...), set when phase is SUCCEEDED.
  string digest = 3;

  // Error message, set when phase is FAILED.
  string error = 4;
}

message BuildLogsRequest {
  string build_id = 1;
  // Start streaming from this line index (0-based).
  int32 offset = 2;
}

message BuildLogEntry {
  string line = 1;
}

message DeleteImagesRequest {
  // Project name (e.g., "myapp" or "org/myapp").
  string project = 1;
}

message DeleteImagesResponse {
  // Repositories that were deleted (e.g., "myapp/api", "myapp/web").
  repeated string deleted_repositories = 1;
}

enum BuildPhase {
  BUILD_PHASE_UNSPECIFIED = 0;
  BUILD_PHASE_QUEUED = 1;
  BUILD_PHASE_CLONING = 2;
  BUILD_PHASE_BUILDING = 3;
  BUILD_PHASE_PUSHING = 4;
  BUILD_PHASE_SUCCEEDED = 5;
  BUILD_PHASE_FAILED = 6;
}
