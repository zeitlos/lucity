server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    # Serve pre-rendered static files only — no SPA fallback.
    # Every page is statically generated, so unknown paths should 404
    # instead of serving the SPA shell (which returns 200 for non-existent
    # routes, confusing search engines).
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache hashed assets (Nuxt _nuxt/ with content hashes) — immutable
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts
    location /_fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets (images, video, icons)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|mp4|webm|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}
