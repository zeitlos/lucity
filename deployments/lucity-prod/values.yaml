# Lucity platform values for lucity-prod (Hetzner)
#
# Secrets are passed via --set at install time:
#   --set secrets.GITHUB_WEBHOOK_SECRET="<from-github-app>"
#   --set secrets.ARGOCD_TOKEN="$ARGOCD_TOKEN"
#   --set secrets.SOFTSERVE_TOKEN="$SOFTSERVE_TOKEN"
#   --set-file githubPrivateKey=<path-to-github-app.pem>
#   --set-file softserveKey=~/.ssh/lucity-admin-prod

registryPull:
  host: "10.96.100.100:5000"
  username: reader

routes:
  enabled: true

gateway:
  env:
    INTERNAL_JWT_PRIVATE_KEY_PATH: /secrets/internal-jwt/private.pem
    OIDC_ISSUER_URL: https://id.lucity.cloud/oidc
    OIDC_CLIENT_ID: 30ztkgeb1c7hwmnx6bf4s
    OIDC_CALLBACK_URL: https://lucity.cloud/auth/callback
    DASHBOARD_URL: https://lucity.cloud/app
    GITHUB_APP_ID: "2882801"
    GITHUB_PRIVATE_KEY_PATH: /secrets/github/github-app.pem
    GITHUB_APP_SLUG: lucity-platform
    GITHUB_CLIENT_ID: Iv23liMzm79VIgvNtglX
    GITHUB_OAUTH_CALLBACK_URL: https://lucity.cloud/auth/github/callback
    BUILDER_ADDR: lucity-builder:9001
    PACKAGER_ADDR: lucity-packager:9002
    DEPLOYER_ADDR: lucity-deployer:9003
    CASHIER_ADDR: lucity-cashier:9005
    REGISTRY_URL: lucity-infra-zot.lucity-system.svc.cluster.local:5000
    REGISTRY_IMAGE_PREFIX: 10.96.100.100:5000
    WORKLOAD_DOMAIN: lucity.app
    DOMAIN_TARGET: lb.lucity.app
    IP_ADDRESS: "46.225.47.40"
    LOGTO_ENDPOINT: http://lucity-infra-logto.lucity-system.svc.cluster.local:3001
  envSecret:
    JWT_SECRET: JWT_SECRET
    GITHUB_CLIENT_SECRET: GITHUB_CLIENT_SECRET
    SESSION_SECRET: SESSION_SECRET
    LOGTO_M2M_APP_ID: LOGTO_M2M_APP_ID
    LOGTO_M2M_APP_SECRET: LOGTO_M2M_APP_SECRET

builder:
  serviceAccount:
    create: true
  registryHost: lucity-infra-zot.lucity-system.svc.cluster.local:5000
  registryUsername: builder
  env:
    INTERNAL_JWT_PUBLIC_KEY_PATH: /secrets/internal-jwt/public.pem
    REGISTRY_URL: lucity-infra-zot.lucity-system.svc.cluster.local:5000
    REGISTRY_USERNAME: builder
    REGISTRY_INSECURE: "true"
  envSecret:
    REGISTRY_PASSWORD: REGISTRY_PASSWORD

packager:
  env:
    INTERNAL_JWT_PUBLIC_KEY_PATH: /secrets/internal-jwt/public.pem
    SOFTSERVE_SSH_ADDR: lucity-infra-soft-serve.lucity-system.svc.cluster.local:23231
    SOFTSERVE_HTTP_ADDR: http://lucity-infra-soft-serve.lucity-system.svc.cluster.local:23232
    SOFTSERVE_SSH_KEY_PATH: /secrets/softserve/admin-key
    DEPLOYER_ADDR: lucity-deployer:9003
  envSecret:
    SOFTSERVE_TOKEN: SOFTSERVE_TOKEN

deployer:
  serviceAccount:
    create: true
  env:
    INTERNAL_JWT_PUBLIC_KEY_PATH: /secrets/internal-jwt/public.pem
    ARGOCD_ADDR: http://lucity-infra-argocd-server.lucity-system.svc.cluster.local:80
    ARGOCD_INSECURE: "true"
    SOFTSERVE_HTTP_ADDR: http://lucity-infra-soft-serve.lucity-system.svc.cluster.local:23232
  envSecret:
    ARGOCD_TOKEN: ARGOCD_TOKEN
    SOFTSERVE_TOKEN: SOFTSERVE_TOKEN

webhook:
  env:
    INTERNAL_JWT_PRIVATE_KEY_PATH: /secrets/internal-jwt/private.pem
    GITHUB_APP_ID: "2882801"
    GITHUB_PRIVATE_KEY_PATH: /secrets/github/github-app.pem
    BUILDER_ADDR: lucity-builder:9001
    PACKAGER_ADDR: lucity-packager:9002
    DEPLOYER_ADDR: lucity-deployer:9003
    REGISTRY_PUSH_URL: lucity-infra-zot.lucity-system.svc.cluster.local:5000
  envSecret:
    WEBHOOK_SECRET: GITHUB_WEBHOOK_SECRET

cashier:
  enabled: true
  env:
    INTERNAL_JWT_PUBLIC_KEY_PATH: /secrets/internal-jwt/public.pem
    INTERNAL_JWT_PRIVATE_KEY_PATH: /secrets/internal-jwt/private.pem
    DEPLOYER_ADDR: lucity-deployer:9003
    STRIPE_HOBBY_PRICE_ID: price_1TASy6AoheV3Drw6W13KVFYm
    STRIPE_PRO_PRICE_ID: price_1TASy7AoheV3Drw6t22UVU8C
    STRIPE_ECO_CPU_PRICE_ID: price_1TASyOAoheV3Drw6CUwBuS1L
    STRIPE_ECO_MEM_PRICE_ID: price_1TASyPAoheV3Drw6MLH0Qh0C
    STRIPE_ECO_DISK_PRICE_ID: price_1TASyQAoheV3Drw6EVAyG6oP
    STRIPE_PROD_CPU_PRICE_ID: price_1TF9qaAoheV3Drw6En35zCEK
    STRIPE_PROD_MEM_PRICE_ID: price_1TF9qmAoheV3Drw6zasPNVfM
    STRIPE_PROD_DISK_PRICE_ID: price_1TASySAoheV3Drw6IuGVM6iw
    STRIPE_ECO_CPU_METER_EVENT: eco_cpu_usage
    STRIPE_ECO_MEM_METER_EVENT: eco_memory_usage
    STRIPE_ECO_DISK_METER_EVENT: eco_disk_usage
    STRIPE_PROD_CPU_METER_EVENT: prod_cpu_usage
    STRIPE_PROD_MEM_METER_EVENT: prod_memory_usage
    STRIPE_PROD_DISK_METER_EVENT: prod_disk_usage
  envSecret:
    STRIPE_SECRET_KEY: STRIPE_SECRET_KEY
    STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET
    SIGNOZ_CLICKHOUSE_DSN: SIGNOZ_CLICKHOUSE_DSN
