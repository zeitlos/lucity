# Lucity infrastructure values for lucity-prod (Hetzner)

zot:
  persistence: true
  pvc:
    create: true
    storage: 20Gi
    storageClassName: hcloud-volumes
  service:
    clusterIP: "10.96.100.100"

softServe:
  persistence:
    size: 10Gi
    storageClass: hcloud-volumes
  initialAdminKey: "" # --set softServe.initialAdminKey="$(cat ~/.ssh/lucity-admin-prod.pub)"

argo-cd:
  enabled: true
  configs:
    params:
      server.insecure: true

cloudnative-pg:
  enabled: true

gateway:
  enabled: true
  className: cilium
  name: lucity-gateway
  infrastructure:
    annotations:
      flexplane.io/provider: hetzner
      load-balancer.hetzner.cloud/location: nbg1
      load-balancer.hetzner.cloud/name: flexplane-lucity-prod-gateway
  listeners:
    - name: platform-http
      protocol: HTTP
      port: 80
      hostname: lucity.cloud
    - name: platform-https
      protocol: HTTPS
      port: 443
      hostname: lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: lucity-cloud-tls
    - name: workload-http
      protocol: HTTP
      port: 80
      hostname: "*.lucity.app"
    - name: workload-https
      protocol: HTTPS
      port: 443
      hostname: "*.lucity.app"
      tls:
        mode: Terminate
        certificateRefs:
          - name: lucity-app-wildcard-tls
    - name: analytics-http
      protocol: HTTP
      port: 80
      hostname: p.lucity.cloud
    - name: analytics-https
      protocol: HTTPS
      port: 443
      hostname: p.lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: p-lucity-cloud-tls

certificates:
  - name: lucity-cloud-tls
    secretName: lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - lucity.cloud
  - name: lucity-app-wildcard-tls
    secretName: lucity-app-wildcard-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - "*.lucity.app"
  - name: p-lucity-cloud-tls
    secretName: p-lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - p.lucity.cloud

# Rybbit Web Analytics
rybbit:
  enabled: true
  hostname: p.lucity.cloud
  backend:
    baseUrl: "https://p.lucity.cloud"
    disableSignup: true
  clickhouse:
    persistence:
      storageClass: hcloud-volumes
      size: 10Gi
  postgres:
    storageClass: hcloud-volumes
  secrets:
    clickhousePassword: ""   # --set rybbit.secrets.clickhousePassword
    betterAuthSecret: ""     # --set rybbit.secrets.betterAuthSecret
