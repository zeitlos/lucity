# Lucity infrastructure values for lucity-prod (Hetzner)

zot:
  persistence: true
  pvc:
    create: true
    storage: 20Gi
    storageClassName: hcloud-volumes
  service:
    clusterIP: "10.96.100.100"
  mountConfig: true
  configFiles:
    config.json: |-
      {
        "storage": {
          "rootDirectory": "/var/lib/registry",
          "gc": true,
          "gcDelay": "1h",
          "gcInterval": "24h"
        },
        "http": {
          "address": "0.0.0.0",
          "port": "5000",
          "compat": ["docker2s2"],
          "auth": {
            "htpasswd": {
              "path": "/etc/zot/htpasswd"
            }
          },
          "accessControl": {
            "repositories": {
              "**": {
                "anonymousPolicy": ["read"],
                "policies": [
                  {
                    "users": ["builder"],
                    "actions": ["read", "create", "update", "delete"]
                  }
                ]
              }
            }
          }
        },
        "log": {
          "level": "info"
        }
      }
    # htpasswd: builder user with read-write access (used by BuildKit to push images and cache).
    # Anonymous gets read-only access (needed for kubelet image pulls).
    # Generate: htpasswd -bBn builder "$(openssl rand -hex 16)"
    htpasswd: ""  # --set zot.configFiles.htpasswd

softServe:
  persistence:
    size: 10Gi
    storageClass: hcloud-volumes
  initialAdminKey: "" # --set softServe.initialAdminKey="$(cat ~/.ssh/lucity-admin-prod.pub)"

gateway:
  className: cilium
  customDomainPlaceholder: true
  infrastructure:
    annotations:
      flexplane.io/provider: hetzner
      load-balancer.hetzner.cloud/location: nbg1
      load-balancer.hetzner.cloud/name: flexplane-lucity-prod-gateway
  listeners:
    - name: platform-http
      protocol: HTTP
      port: 80
      hostname: lucity.cloud
    - name: platform-https
      protocol: HTTPS
      port: 443
      hostname: lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: lucity-cloud-tls
    - name: workload-http
      protocol: HTTP
      port: 80
      hostname: "*.lucity.app"
    - name: workload-https
      protocol: HTTPS
      port: 443
      hostname: "*.lucity.app"
      tls:
        mode: Terminate
        certificateRefs:
          - name: lucity-app-wildcard-tls
    - name: analytics-http
      protocol: HTTP
      port: 80
      hostname: p.lucity.cloud
    - name: analytics-https
      protocol: HTTPS
      port: 443
      hostname: p.lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: p-lucity-cloud-tls
    - name: auth-http
      protocol: HTTP
      port: 80
      hostname: auth.lucity.cloud
    - name: auth-https
      protocol: HTTPS
      port: 443
      hostname: auth.lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: auth-lucity-cloud-tls
    - name: id-http
      protocol: HTTP
      port: 80
      hostname: id.lucity.cloud
    - name: id-https
      protocol: HTTPS
      port: 443
      hostname: id.lucity.cloud
      tls:
        mode: Terminate
        certificateRefs:
          - name: id-lucity-cloud-tls
    # Custom domain listeners are managed by the deployer (per-domain HTTP + HTTPS pairs).
    # No catch-all listeners here — each domain gets its own isolated listener.

clusterIssuers:
  - name: letsencrypt-http01
    acme:
      server: https://acme-v02.api.letsencrypt.org/directory
      email: certificates@zeitlos.software
      solvers:
        - http01:
            gatewayHTTPRoute:
              parentRefs:
                - name: lucity-gateway
                  namespace: lucity-system
                  kind: Gateway

certificates:
  - name: lucity-cloud-tls
    secretName: lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - lucity.cloud
  - name: lucity-app-wildcard-tls
    secretName: lucity-app-wildcard-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - "*.lucity.app"
  - name: p-lucity-cloud-tls
    secretName: p-lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - p.lucity.cloud
  - name: auth-lucity-cloud-tls
    secretName: auth-lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - auth.lucity.cloud
  - name: id-lucity-cloud-tls
    secretName: id-lucity-cloud-tls
    issuerRef:
      name: letsencrypt-dns01
    dnsNames:
      - id.lucity.cloud

# Rybbit Web Analytics
rybbit:
  enabled: true
  hostname: p.lucity.cloud
  backend:
    baseUrl: "https://p.lucity.cloud"
  clickhouse:
    persistence:
      storageClass: hcloud-volumes
      size: 10Gi
  postgres:
    storageClass: hcloud-volumes
  secrets:
    clickhousePassword: ""   # --set rybbit.secrets.clickhousePassword
    betterAuthSecret: ""     # --set rybbit.secrets.betterAuthSecret

# Logto Identity Provider
logto:
  enabled: true
  endpoint: https://id.lucity.cloud
  postgres:
    storageClass: hcloud-volumes
