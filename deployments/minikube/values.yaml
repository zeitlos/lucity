# Lucity infrastructure values for minikube

zot:
  persistence: true
  pvc:
    create: true
    storage: 5Gi
  # Fixed ClusterIP so image refs work without DNS resolution in Docker daemon.
  # Docker on minikube uses host DNS (not CoreDNS), so cluster-internal DNS names
  # don't resolve for image pulls. A fixed IP in the service CIDR solves this.
  service:
    clusterIP: 10.96.100.50

softServe:
  persistence:
    size: 2Gi
  initialAdminKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHWFwhUiR9NfDEQYZpx5Th1WC+9wG7ZJAClNNt1Rmee2"
